version: 0.0
os: linux
files:
  - source: /
    destination: /home/ec2-user/pms_java
    overwrite: true
file_exists_behavior: OVERWRITE
permissions:
  - object: /home/ec2-user/pms_java
    owner: ec2-user
    group: ec2-user
    type:
      - directory
      - file
hooks:
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 600
      runas: ec2-user
