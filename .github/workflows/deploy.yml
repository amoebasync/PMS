name: Deploy

on:
  push:
    branches: [main]

env:
  EC2_USER: ec2-user
  APP_DIR: ~/pms_java
  S3_BUCKET: pms-uploads-tiramis

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # ── 1. チェックアウト（修正ポイント） ──
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # shallow clone を避ける
          persist-credentials: true
          # サブモジュールがあるなら:
          # submodules: recursive
          # プライベートリポジトリなら token は自動で使われるが、
          # 別リポジトリのサブモジュールがあるなら:
          # token: ${{ secrets.GH_PAT }}

      # ── 2. git が成功したか確認 ──
      - name: Verify checkout
        run: |
          echo "Current directory: $(pwd)"
          echo "Files:"
          ls -la
          echo "Git status:"
          git log --oneline -3

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. ビルド ──
      - run: npm install --legacy-peer-deps
      - run: npx prisma generate
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # ── 4. ビルド確認 ──
      - name: Verify build output
        run: |
          ls -la .next/
          cat .next/BUILD_ID

      # ── 5. S3同期 ──
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - run: |
          aws s3 sync .next/static s3://$S3_BUCKET/_next/static \
            --cache-control "public,max-age=31536000,immutable" --delete

      # ── 6. tar でまとめて EC2 にデプロイ ──
      - run: tar czf next-build.tar.gz .next

      - name: Deploy to EC2 #1
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST_1 }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "next-build.tar.gz"
          target: ${{ env.APP_DIR }}

      - name: Restart EC2 #1
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_1 }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ env.APP_DIR }}
            git pull origin main
            rm -rf .next
            tar xzf next-build.tar.gz
            rm next-build.tar.gz
            npm install --legacy-peer-deps --production
            npx prisma generate
            npx prisma migrate deploy
            pm2 restart pms

      # EC2 #2 も同様（省略）
