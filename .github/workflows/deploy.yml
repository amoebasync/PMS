name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 #1
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            export PATH=$PATH:/home/ec2-user/.nvm/versions/node/v20.20.0/bin
            cd ~/pms_java
            git pull origin main
            npm install --legacy-peer-deps
            npx prisma generate
            npm run build
            aws s3 sync .next/static s3://pms-uploads-tiramis/_next/static \
              --cache-control "public,max-age=31536000,immutable"
            aws cloudfront create-invalidation \
              --distribution-id EOOGEE1IL7T06 \
              --paths "/_next/static/*"
            pm2 restart pms

      - name: Deploy to EC2 #2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_2 }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            export PATH=$PATH:/home/ec2-user/.nvm/versions/node/v20.20.0/bin
            cd ~/pms_java
            git pull origin main
            npm install --legacy-peer-deps
            npx prisma generate
            npm run build
            pm2 restart pms
